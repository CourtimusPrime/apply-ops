# Masters-Ops — Canonical States
# Source of truth for masters-ops (writer) and dashboard (reader).
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.

states:
  - id: evaluated
    label: Evaluated
    aliases: [evaluada, evaluado, evaluated]
    description: Program evaluated, application decision pending
    dashboard_group: active

  - id: in_progress
    label: In Progress
    aliases: [in progress, in-progress, wip, drafting, started]
    description: Application materials being prepared
    dashboard_group: active

  - id: submitted
    label: Submitted
    aliases: [submitted, applied, aplicado, enviado, sent]
    description: Application submitted to the program
    dashboard_group: active

  - id: under_review
    label: Under Review
    aliases: [under review, under_review, reviewing, review, respondido]
    description: Application under review by admissions committee
    dashboard_group: active

  - id: interview
    label: Interview
    aliases: [interview, entrevista, interview scheduled, invited]
    description: Invited to interview or visit day
    dashboard_group: active

  - id: admitted
    label: Admitted
    aliases: [admitted, accepted, offer, oferta, acceptance]
    description: Offer of admission received
    dashboard_group: decided

  - id: waitlisted
    label: Waitlisted
    aliases: [waitlisted, waitlist, wait list, wait-listed]
    description: Placed on waitlist
    dashboard_group: decided

  - id: rejected
    label: Rejected
    aliases: [rejected, rechazado, rechazada, declined by program, denied]
    description: Application rejected by the program
    dashboard_group: decided

  - id: committed
    label: Committed
    aliases: [committed, enrolled, accepted offer, matriculated]
    description: Accepted the offer — will attend this program
    dashboard_group: decided

  - id: declined
    label: Declined
    aliases: [declined, withdrew, withdrew application, declined offer, discarded, descartado, descartada, cerrada, cancelada]
    description: Declined the offer or withdrew application
    dashboard_group: decided

  - id: skip
    label: SKIP
    aliases: [skip, no aplicar, no_aplicar, not applying, pass]
    description: Program does not fit — will not apply
    dashboard_group: inactive
