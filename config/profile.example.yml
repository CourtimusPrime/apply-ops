# Masters-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  location: "San Francisco, CA"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
  # (Optional) Personal website or research page
  # research_page: "https://janesmith.dev/research"

academic_profile:
  # Undergraduate (or most recent) degree
  institution: "University of California, Berkeley"
  field: "Computer Science"
  graduation_year: 2023
  gpa: 3.7
  gpa_scale: 4.0
  # Optional: note context (e.g., "Top 10% of class", "Upward trend: 3.9 final year")
  gpa_context: "Upward trend in junior/senior years"

  test_scores:
    # GRE (optional — omit if not taken or not required)
    gre_verbal: 162        # out of 170
    gre_quant: 168         # out of 170
    gre_aw: 4.5            # out of 6.0
    # English proficiency (optional — fill if applicable)
    # toefl: 110           # out of 120
    # ielts: 7.5           # out of 9.0

  research_interests:
    - "Natural language processing and large language models"
    - "Efficient ML inference and model compression"
    - "Human-computer interaction with AI systems"

  publications:
    # Remove this block if you have none — it's optional
    - title: "Efficient Fine-tuning of Large Language Models via LoRA"
      venue: "ACL Workshop on Efficient NLP, 2023"
      url: "https://arxiv.org/abs/example"
      role: "First author"

  research_projects:
    - name: "LLM Benchmark Suite"
      description: "Designed and ran evaluation harness for instruction-following across 5 open models"
      outcome: "Results presented at departmental research symposium"
    - name: "Retrieval-Augmented QA System"
      description: "Built end-to-end RAG pipeline with custom chunking and reranking"
      outcome: "Production-deployed at campus library; 500+ active users"

target_programs:
  # Your target degree types and fields
  degree_types:
    - "MSc Computer Science"
    - "MEng AI / Machine Learning"
  # Track preference guides program-type archetype matching
  track_preference: "research-track"    # research-track | professional-track | open
  # Program types you're targeting (used for framing/archetype matching)
  program_types:
    - name: "Research-track MS"
      fit: "primary"        # primary = ideal, secondary = good fit, adjacent = stretch
    - name: "Professional MS"
      fit: "secondary"
    - name: "Interdisciplinary MS"
      fit: "adjacent"

narrative:
  # Your applicant headline (1 line — used in SOP openings and cover letters)
  headline: "CS graduate with NLP research experience seeking research-track MS in AI"
  # Your academic story — what brought you here and where you're going
  academic_story: "Spent two years doing NLP research in the Berkeley NLP lab. Want to pursue a thesis MS before deciding between a PhD and industry research."
  # Your top 3-5 academic strengths (replaces job-search superpowers)
  academic_strengths:
    - "Research design and empirical evaluation"
    - "Production ML systems (not just notebooks)"
    - "Clear technical writing"
  # Proof points — projects, papers, demos with measurable outcomes
  proof_points:
    - name: "LLM Benchmark Suite"
      url: "https://github.com/janesmith/llm-bench"
      hero_metric: "Evaluated 5 open models; cited by 3 subsequent papers"
    - name: "RAG QA System"
      url: "https://janesmith.dev/rag-demo"
      hero_metric: "500+ active users at UC Berkeley Library"

funding:
  # What funding you're targeting
  target: "fellowship"         # fellowship | TA | RA | self-funded | any
  # Maximum annual cost you can absorb (tuition + living), for fit scoring
  annual_cost_ceiling: 30000
  currency: "USD"
  # Notes on your financial situation (used to flag self-funded programs as a cost)
  notes: "Targeting funded positions; will consider partial funding with TA/RA opportunity"

location:
  country: "United States"
  city: "San Francisco"
  timezone: "PST"
  visa_status: "No sponsorship needed"
  # Willing to relocate for the right program?
  relocation: "Yes — open to any US city for the right program"
  # Remote/hybrid preference for part-time programs (optional)
  # remote_ok: true
